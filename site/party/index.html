<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Private Party — Igroteka</title>
  <link rel="stylesheet" href="../xp.css">
  <link rel="stylesheet" href="../xp-cursors.css?v=2">
  <style>
    /* XP dialog over the C&C briefing backdrop — the window and everything in
       it is native xp.css (Pixelated MS Sans Serif, beige body, sunken inputs,
       real tabs); only the page behind it carries the game branding. */
    * { box-sizing: border-box; }
    html, body { margin:0; height:100%; }
    body {
      /* Tahoma = the real Windows XP UI face (smooth, not the pixel bitmap
         font — that one only holds up at exactly 11px) */
      font-family: Tahoma, "Segoe UI", Geneva, sans-serif; font-size:12px;
      display:flex; align-items:center; justify-content:center; padding:18px;
      /* Igroteka desktop wallpaper (same XP-bliss gradient as the desktop) */
      background:
        radial-gradient(ellipse 120% 60% at 70% 108%, #4a8f2a 0%, #3a7a20 28%, transparent 60%),
        radial-gradient(ellipse 90% 45% at 20% 112%, #5aa332 0%, #47892a 30%, transparent 62%),
        linear-gradient(#2f71c9 0%, #5b9ae0 45%, #9cc6ee 70%, #cfe6f7 100%);
      background-attachment: fixed;
    }
    .wrap { width:100%; max-width:420px; }
    /* game picker: banner-style row — the game's own icon (from the user's
       install, like the desktop shortcut) in a framed panel with the select */
    #gameRow { margin-bottom:12px; }
    #gameRow .picker { display:flex; align-items:center; gap:10px;
      padding:8px 10px; background:linear-gradient(#ffffff, #ece9d8);
      border:1px solid #aca899; border-radius:3px;
      box-shadow: inset 0 1px 0 #fff; }
    #gameRow img { width:32px; height:32px; image-rendering:pixelated; flex:0 0 32px;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,.25)); }
    #gameRow select { flex:1; font-size:14px; height:26px; }
    #gameRow label { display:none; } /* the banner IS the label */
    /* a notch up from xp.css's 11-12px, and Tahoma everywhere xp.css would
       reimpose the pixel face on form controls */
    .window-body, .window-body input, .window-body select, .window-body button,
    .window-body label, .window-body menu[role=tablist] button {
      font-family: Tahoma, "Segoe UI", Geneva, sans-serif;
      font-size: 13px;
    }
    .note, .err, .share { font-size: 12px; }
    .window { box-shadow:4px 4px 16px rgba(0,0,0,.55); }
    .window-body { padding:12px; }
    .lead { margin:2px 2px 12px; color:#222; }
    menu[role=tablist] { margin:0; }
    [role=tabpanel] { padding:14px 12px 12px; }
    .field-row-stacked { margin-bottom:10px; }
    .field-row-stacked input { width:100%; }
    .btnrow { display:flex; justify-content:center; gap:8px; margin-top:14px; }
    .btnrow button { min-width:110px; }
    .err { min-height:14px; margin-top:8px; color:#d80000; text-align:center; }
    .note { margin:10px 2px 0; color:#555; }
    .note b { color:#8a5c00; }
    .hidden { display:none !important; }
    /* lobby */
    #roster li { display:flex; align-items:center; gap:6px; padding:1px 2px; }
    #roster li .who { flex:1; }
    #roster li .tag { color:#555; }
    #roster li .ok { color:#0a7d00; font-weight:700; }
    #roster button { min-width:0; padding:0 8px; font-size:11px; }
    #chatlog li { padding:1px 2px; word-break:break-word; }
    #chatlog li b { color:#00318f; }
    #chatlog li.sys { color:#777; font-style:italic; }
    .share { margin:6px 2px 0; color:#555; word-break:break-all; text-align:left; }
    .backrow { text-align:center; margin-top:12px; }
    .backrow a { color:#7f97b8; text-decoration:none; font-family:"Segoe UI", Roboto, sans-serif; font-size:12px; }
    /* Embedded inside a desktop program window (?embed=1): the host window
       supplies the chrome, so drop ours — no backdrop, wordmark, title bar or
       page footer. Just the beige app surface. */
    body.embed { background:#ece9d8; padding:0; align-items:stretch;
                 height:auto; min-height:0; } /* content-sized so the host
                 window can fit the iframe to it (100% would echo the iframe
                 height back and never shrink) */
    body.embed .wrap { max-width:none; }
    body.embed .title-bar, body.embed .backrow.pagefoot { display:none; }
    body.embed .window { box-shadow:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="window">
      <div class="title-bar">
        <div class="title-bar-text">Multiplayer Party</div>
      </div>
      <div class="window-body">

        <!-- create / join / browse -->
        <div id="forms">
          <p class="lead">Gather your friends, then launch straight into the battle.</p>

          <!-- game picker — Igroteka is a café: more games will land here -->
          <div class="field-row-stacked" id="gameRow">
            <label for="game">Game</label>
            <div class="picker">
              <img id="gameIcon" src="../icons/games.png" alt="">
              <select id="game">
                <option value="zh" selected>C&amp;C Generals: Zero Hour</option>
              </select>
            </div>
          </div>

          <menu role="tablist" class="justified">
            <button id="tabCreate" type="button" aria-selected="true" aria-controls="tabPanel">Create</button>
            <button id="tabJoin" type="button" aria-selected="false" aria-controls="tabPanel">Join by code</button>
            <button id="tabPublic" type="button" aria-selected="false" aria-controls="tabPanel">Public games</button>
          </menu>
          <div role="tabpanel" id="tabPanel">
            <form id="form" autocomplete="off">
              <div class="field-row-stacked">
                <label for="name">Your name</label>
                <input id="name" maxlength="24" placeholder="General" autocomplete="off">
              </div>
              <div class="field-row-stacked" id="codeRow">
                <label for="code">Room code</label>
                <input id="code" maxlength="16" placeholder="the code your host shared"
                       autocapitalize="off" autocomplete="off" spellcheck="false">
              </div>
              <div class="field-row-stacked" id="passRow">
                <label for="pass">Party password <span id="passHint" style="color:#777;font-weight:normal"></span></label>
                <input id="pass" type="password" maxlength="128"
                       placeholder="the shared secret" autocomplete="new-password">
              </div>
              <!-- public browser (shown on the Public tab) -->
              <div id="pubBox" class="hidden">
                <div class="field-row" style="justify-content:space-between;margin:2px 0 4px">
                  <label style="margin:0">Open games anyone can join</label>
                  <button id="refreshPub" type="button">↻ Refresh</button>
                </div>
                <ul class="tree-view" id="pubList" style="height:150px;overflow-y:auto;margin:0"></ul>
              </div>
              <div class="btnrow"><button id="go" type="submit">Create Party</button></div>
              <div id="err" class="err"></div>
            </form>
          </div>

          <p class="note" id="createNote"><b>Password</b> = private party (only people
            with the password get in). <b>No password</b> = public game, listed for
            anyone to join.</p>
        </div>

        <!-- lobby: gather, chat, moderate, launch -->
        <div id="lobbyPanel" class="hidden">
          <div class="field-row" style="gap:6px">
            <label for="createdCode">Room code</label>
            <input id="createdCode" readonly onclick="this.select()" style="flex:1;text-align:center;font-weight:700;letter-spacing:2px">
            <button id="copyCode" type="button">Copy</button>
          </div>
          <p id="shareLink" class="share"></p>

          <div class="field-row-stacked" style="margin-top:8px">
            <label>Players <span id="playerCount" style="color:#555;font-weight:normal"></span></label>
            <ul class="tree-view" id="roster" style="height:86px;overflow-y:auto;margin:0"></ul>
          </div>

          <div class="field-row-stacked">
            <label for="chatMsg">Chat</label>
            <ul class="tree-view" id="chatlog" style="height:110px;overflow-y:auto;margin:0"></ul>
          </div>
          <div class="field-row" style="gap:6px">
            <input id="chatMsg" maxlength="500" placeholder="say something…" style="flex:1">
            <button id="chatSend" type="button">Send</button>
          </div>

          <div class="field-row" style="margin-top:10px;justify-content:space-between">
            <div class="field-row" style="margin:0">
              <input type="checkbox" id="readyBox">
              <label for="readyBox">Ready</label>
            </div>
            <button id="startGame" type="button" class="hidden">Start Game</button>
            <span id="waitMsg" class="hidden" style="color:#555">waiting for the host to start…</span>
          </div>
          <div class="btnrow" style="margin-top:12px"><button id="leaveLobby" type="button">Leave party</button></div>
        </div>

      </div>
    </div>
    <!-- pagefoot: hidden in embed mode — the desktop IS Igroteka -->
    <div class="backrow pagefoot"><a href="/">← back to Igroteka</a></div>
  </div>

  <script src="../xp-dialog.js"></script>
  <script src="party.js"></script>
</body>
</html>
