<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Igroteka</title>
  <link rel="stylesheet" href="xp.css">
  <script>
    // surface boot errors instead of a silently dead desktop
    window.__bootErr = null;
    addEventListener('error', (e) => { window.__bootErr = (e.error && e.error.stack) || e.message; });
    addEventListener('unhandledrejection', (e) => { window.__bootErr = 'rejection: ' + e.reason; });
  </script>
  <style>
    /* Original XP-inspired theme. No Microsoft assets: wallpaper is CSS art,
       icons are emoji/SVG, styles come from XP.css (MIT). */
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: "Pixelated MS Sans Serif", Tahoma, sans-serif;
      background:
        radial-gradient(ellipse 120% 60% at 70% 108%, #4a8f2a 0%, #3a7a20 28%, transparent 60%),
        radial-gradient(ellipse 90% 45% at 20% 112%, #5aa332 0%, #47892a 30%, transparent 62%),
        linear-gradient(#2f71c9 0%, #5b9ae0 45%, #9cc6ee 70%, #cfe6f7 100%);
      user-select: none;
    }
    #desktop { position: absolute; inset: 0 0 30px 0; }
    .icon {
      width: 84px; text-align: center; color: #fff; cursor: default;
      position: absolute; padding: 4px;
      text-shadow: 1px 1px 2px rgba(0,0,0,.8); font-size: 11px;
    }
    .icon .glyph { font-size: 34px; line-height: 1.1; filter: drop-shadow(1px 2px 2px rgba(0,0,0,.4)); }
    .icon .glyph img { width: 36px; height: 36px; image-rendering: pixelated; }
    .icon.selected { background: rgba(49,106,197,.45); outline: 1px dotted #fff; }
    .window { position: absolute; min-width: 380px; box-shadow: 4px 4px 16px rgba(0,0,0,.45); }
    .window .title-bar { cursor: default; }
    /* The pixelated MS Sans face sets tight — a little tracking and taller
       lines keep body text readable at 12px. */
    .window-body { background: #ece9d8; letter-spacing: .5px; line-height: 1.5; }
    #taskbar {
      position: absolute; left: 0; right: 0; bottom: 0; height: 30px;
      background: linear-gradient(#3168d5 0%, #4993e6 6%, #2b63cf 50%, #1941a5 100%);
      display: flex; align-items: center; gap: 6px; padding: 0 4px 0 0;
      border-top: 1px solid #0f2f7c;
    }
    #startBtn {
      height: 24px; margin: 0 2px; padding: 0 16px 0 10px; border-radius: 8px;
      background: linear-gradient(#4bb04b 0%, #2d8a2d 50%, #1f6b1f 100%);
      color: #fff; font-weight: bold; font-style: italic; font-size: 14px;
      border: 0; box-shadow: inset 0 0 4px rgba(255,255,255,.5); cursor: pointer;
    }
    #tasks { flex: 1; display: flex; gap: 4px; }
    .taskBtn { height: 22px; min-width: 140px; text-align: left; font-size: 11px; }
    #clock { color: #fff; font-size: 11px; padding: 0 10px; border-left: 1px solid rgba(255,255,255,.3);
             background: linear-gradient(#1d9ede, #1372ba); height: 100%; display:flex; align-items:center; }
    /* Fullscreen toggle lives in the tray, XP style */
    #trayFs { color: #fff; font-size: 14px; padding: 0 8px; border-left: 1px solid rgba(255,255,255,.3);
              background: linear-gradient(#1d9ede, #1372ba); height: 100%; display:flex; align-items:center;
              cursor: pointer; user-select: none; margin-left: auto; }
    #trayFs:hover { background: linear-gradient(#2fb0ee, #1e82ca); }
    #tasks + #trayFs { margin-left: 0; }
    #startMenu {
      position: absolute; bottom: 30px; left: 0; width: 400px; display: none;
      border: 1px solid #0f2f7c; border-bottom: 0;
      border-radius: 6px 6px 0 0; overflow: hidden;
      box-shadow: 4px -2px 14px rgba(0,0,0,.45);
      background: #4282d6;
    }
    #smHeader {
      display: flex; align-items: center; gap: 10px; padding: 8px 10px;
      background: linear-gradient(#3c8af0 0%, #2b63cf 60%, #245bc4 100%);
      border-bottom: 2px solid #e59700;
    }
    #smHeader .avatar {
      width: 42px; height: 42px; border-radius: 6px; background: #fff;
      border: 2px solid #9cc6ee; display: flex; align-items: center;
      justify-content: center; font-size: 26px;
      box-shadow: inset 0 0 3px rgba(0,0,0,.3);
    }
    #smHeader .uname { color: #fff; font-size: 14px; font-weight: bold;
      text-shadow: 1px 1px 1px rgba(0,0,0,.4); }
    #smHeader { cursor: pointer; }
    #smHeader:hover .uname { text-decoration: underline; }
    #smHeader .avatar img { border-radius: 4px; object-fit: cover; }
    /* account window */
    .acctBtn { display: block; width: 100%; margin: 4px 0; text-align: left; padding: 6px 10px; }
    .acctBtn:disabled { color: #888; }
    .acctRow { display: flex; align-items: center; gap: 8px; padding: 5px 0;
      border-bottom: 1px solid #e4e0d0; font-size: 12px; }
    .acctRow:last-child { border-bottom: 0; }
    .acctRow .grow { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .acctBadge { font-size: 10px; background: #d8e4f8; border: 1px solid #7a99d6;
      border-radius: 3px; padding: 1px 5px; color: #0a246a; }
    .acctErr { background: #fff; border: 1px solid #d83a2e; padding: 8px 10px;
      font-size: 11px; margin-bottom: 10px; display: flex; gap: 8px; align-items: flex-start; }
    #smCols { display: flex; }
    #smLeft { flex: 1.15; background: #fff; padding: 6px 0; min-height: 240px;
      display: flex; flex-direction: column; }
    #smRight { flex: 1; background: #d3e5fa; border-left: 1px solid #95bdee;
      padding: 6px 0; min-height: 240px; }
    .item { padding: 7px 10px; font-size: 12px; cursor: pointer;
      display: flex; gap: 8px; align-items: center; color: #0a246a; }
    .item .ig { font-size: 22px; width: 26px; text-align: center; }
    img.ig { width: 24px; height: 24px; object-fit: contain; }
    .item:hover { background: #316ac5; color: #fff; }
    #smRight .item { font-weight: bold; }
    .smSep { border-top: 1px solid #d9d5c9; margin: 4px 10px; }
    #smRight .smSep { border-top: 1px solid #a8c8ea; }
    #smLeft .spacer { flex: 1; }
    #allPrograms { position: relative; }
    #apFlyout { display: none; position: absolute; left: 100%; bottom: 0;
      width: 230px; background: #fff; border: 1px solid #7a99d6;
      box-shadow: 3px 3px 10px rgba(0,0,0,.35); }
    #allPrograms:hover #apFlyout { display: block; }
    #smFooter {
      display: flex; justify-content: flex-end; gap: 14px; padding: 7px 12px;
      background: linear-gradient(#3c8af0 0%, #2b63cf 60%, #245bc4 100%);
      border-top: 1px solid #1941a5;
    }
    #smFooter .foot { color: #fff; font-size: 12px; cursor: pointer;
      display: flex; align-items: center; gap: 6px; }
    #smFooter .foot .k { width: 22px; height: 22px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: #fff; }
    #smFooter .off .k { background: linear-gradient(#f0a44b, #d9822b); }
    #smFooter .foot:hover { text-decoration: underline; }
    .wizardArt { width: 110px; background: linear-gradient(#1941a5, #2f71c9);
      display:flex; align-items:flex-end; justify-content:center; font-size:44px; padding-bottom:14px; }
    .wizardStep { display: flex; min-height: 240px; }
    .wizardMain { flex: 1; padding: 14px; font-size: 12px; }
    .wizardMain h3 { margin-top: 0; }
    .wizardBtns { display: flex; justify-content: flex-end; gap: 6px; padding: 10px 14px;
      border-top: 1px solid #cfcabc; }
    .filelist { background:#fff; border:1px inset #999; height:110px; overflow:auto;
      font-size:11px; padding:4px; margin-top:8px; }
    .filelist div { display:flex; justify-content:space-between; }
    .ok { color: #0a7a2a; } .bad { color: #b02020; }
    progress { width: 100%; }
    /* boot screen — original art, XP-era vibe */
    #boot { position: fixed; inset: 0; background: #000; z-index: 9999;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 48px; }
    #boot.hidden { display: none; }
    #bootLogo { text-align: center; color: #fff; font-size: 42px;
      font-weight: bold; font-family: Tahoma, sans-serif; }
    #bootLogo .mark { font-size: 54px; display: block; margin-bottom: 10px; }
    #bootLogo small { display: block; font-size: 14px; font-weight: normal;
      color: #9aa2b8; margin-top: 6px; letter-spacing: 1px; }
    #bootBar { width: 220px; height: 16px; border: 2px solid #7d7d7d;
      border-radius: 8px; overflow: hidden; position: relative; }
    #bootBar .blocks { position: absolute; top: 50%; transform: translateY(-50%);
      left: -60px; display: flex; gap: 4px;
      animation: bootscroll 1.1s linear infinite; }
    #bootBar .blocks span { width: 12px; height: 8px; border-radius: 2px;
      background: linear-gradient(#7ab1f5, #2b63cf); }
    @keyframes bootscroll { from { left: -60px; } to { left: 236px; } }
  </style>
</head>
<body>
  <div id="boot">
    <div id="bootLogo">
      <span class="mark">🕹️</span>
      Igroteka<small>игротека · the gaming café</small>
    </div>
    <div id="bootBar"><div class="blocks"><span></span><span></span><span></span></div></div>
  </div>
  <script>
    // Synchronous, parser-blocking on purpose: the boot screen is VISIBLE in
    // markup so Chrome's first paint can't flash the desktop behind it; this
    // hides it before paint for returning visitors in the same session.
    if (sessionStorage.getItem('booted'))
      document.getElementById('boot').classList.add('hidden');
  </script>
  <div id="desktop"></div>

  <div id="startMenu">
    <div id="smHeader">
      <div class="avatar"><img src="icons/user.png" style="width:34px;height:34px"></div>
      <div class="uname">Гость</div>
    </div>
    <div id="smCols">
      <div id="smLeft">
        <div class="item" data-open="setup" id="smSetup"><img class="ig" src="icons/cd.png">Install C&amp;C Generals: Zero Hour</div>
        <div class="item" data-open="zh" style="display:none" id="smPlay"><img class="ig game-ico" src="icons/games.png">C&amp;C Generals: Zero Hour</div>
        <div class="smSep"></div>
        <div class="item" data-open="uninstall" style="display:none" id="smUninstall"><img class="ig" src="icons/trash.png">Uninstall Zero Hour</div>

        <div class="item" data-open="about"><img class="ig" src="icons/doc.png">About Igroteka</div>
        <div class="item"><img class="ig" src="icons/games.png">My Games</div>
        <div class="item"><img class="ig" src="icons/pictures.png">My Screenshots</div>
        <div class="smSep"></div>
        <div class="item"><img class="ig" src="icons/settings.png">Settings</div>
        <div class="item"><img class="ig" src="icons/help.png">Help and Support</div>
      </div>
    </div>
    <div id="smFooter">
      <div class="foot off" id="footOff"><img src="icons/shutdown.png" style="width:22px;height:22px;border-radius:4px">Turn Off Computer</div>
    </div>
  </div>

  <div id="taskbar">
    <button id="startBtn">игротека</button>
    <div id="tasks"></div>
    <div id="trayFs" title="Fullscreen">⛶</div>
    <div id="clock"></div>
  </div>

<script type="module">
import { classify, opfsWrite, opfsInventory, missingFiles, requestPersistence,
         zipEntries, gameIconURL, opfsReadFile, opfsWritable, dedupeImports,
         setGameFavicon, SITE_VERSION, ENGINE_BUILD } from './igroteka.js?v=22';
import * as cafe from './cafe.js?v=1';
setGameFavicon();

// Fullscreen toggle in the taskbar tray. documentElement keeps every XP
// window inside the fullscreened element.
const trayFs = document.getElementById('trayFs');
if (!document.fullscreenEnabled && !document.webkitFullscreenEnabled) {
  trayFs.style.display = 'none';
} else {
  trayFs.addEventListener('click', () => {
    const el = document.documentElement;
    if (document.fullscreenElement || document.webkitFullscreenElement)
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    else
      (el.requestFullscreen || el.webkitRequestFullscreen).call(el, { navigationUI: 'hide' });
  });
}

// Launching a game navigates, and navigation always exits fullscreen (browser
// rule). Remember the state so the play page can offer one-tap re-entry
// while the game is still loading.
addEventListener('pagehide', () => {
  if (document.fullscreenElement || document.webkitFullscreenElement)
    sessionStorage.setItem('igFsWish', '1');
});

// ---------- tiny window manager ----------
const desktop = document.getElementById('desktop');
const tasks = document.getElementById('tasks');
let zTop = 10;
const openWindows = new Map();  // id -> {el, task}

function makeWindow(id, title, w, h) {
  // Singleton per app id: re-focus instead of duplicating
  const existing = openWindows.get(id);
  if (existing && document.body.contains(existing.el)) {
    existing.el.style.display = '';
    existing.el.style.zIndex = ++zTop;
    return null;
  }
  const el = document.createElement('div');
  el.className = 'window';
  el.style.width = w + 'px';
  el.style.left = (60 + Math.random() * 120) + 'px';
  el.style.top = (40 + Math.random() * 60) + 'px';
  el.innerHTML = `
    <div class="title-bar">
      <div class="title-bar-text">${title}</div>
      <div class="title-bar-controls">
        <button aria-label="Minimize"></button>
        <button aria-label="Close"></button>
      </div>
    </div>
    <div class="window-body" style="margin:0"></div>`;
  desktop.appendChild(el);

  const task = document.createElement('button');
  task.className = 'taskBtn';
  task.textContent = title;
  tasks.appendChild(task);

  const focus = () => { el.style.zIndex = ++zTop; };
  focus();
  el.addEventListener('mousedown', focus);
  task.onclick = () => { el.style.display = ''; focus(); };
  el.querySelector('[aria-label="Minimize"]').onclick = () => { el.style.display = 'none'; };
  el.querySelector('[aria-label="Close"]').onclick = () => { el.remove(); task.remove(); openWindows.delete(id); };
  openWindows.set(id, { el, task });

  // drag
  const bar = el.querySelector('.title-bar');
  bar.addEventListener('mousedown', (e) => {
    const sx = e.clientX - el.offsetLeft, sy = e.clientY - el.offsetTop;
    const move = (e) => { el.style.left = (e.clientX - sx) + 'px'; el.style.top = Math.max(0, e.clientY - sy) + 'px'; };
    const up = () => { removeEventListener('mousemove', move); removeEventListener('mouseup', up); };
    addEventListener('mousemove', move); addEventListener('mouseup', up);
  });
  return el.querySelector('.window-body');
}

// ---------- desktop icons ----------
function addIcon(id, glyph, label, x, y, onOpen) {
  const el = document.createElement('div');
  el.className = 'icon'; el.style.left = x + 'px'; el.style.top = y + 'px';
  el.innerHTML = `<div class="glyph">${glyph}</div>${label}`;
  el.addEventListener('click', () => {
    document.querySelectorAll('.icon').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
  });
  el.addEventListener('dblclick', onOpen);
  desktop.appendChild(el);
  return el;
}

// ---------- apps ----------
function openAbout() {
  const body = makeWindow('about', 'About Igroteka', 420);
  if (!body) return;
  body.innerHTML = `<div style="padding:14px;font-size:12px">
    <p><b>Igroteka</b> — the 2000s gaming café, in your browser.</p>
    <p style="color:#555">Version ${SITE_VERSION} &middot;
       Dvijoke engine build ${ENGINE_BUILD} (WebGL2)</p>
    <p>Real native game ports (WebAssembly, Dvijoke engine), no streaming.
       Your game files stay on your device — Igroteka never uploads or hosts them.</p>
    <p>Made by Meerzulee</p>
    <p>Source code: the game engine is
       <a href="https://github.com/meerzulee/GeneralsXWeb" target="_blank" rel="noopener">GeneralsXWeb</a>
       (GPLv3, from EA's release via GeneralsX) on the
       <a href="https://github.com/meerzulee/dvijoke" target="_blank" rel="noopener">Dvijoke</a>
       d8web graphics layer (MIT).</p>
    <p>Not affiliated with or endorsed by EA or Microsoft.</p></div>`;
}

async function openSetup() {
  const body = makeWindow('setup', 'Setup — C&C Generals: Zero Hour', 520);
  if (!body) return;
  let stepEl;
  const render = (html, btns) => {
    body.innerHTML = `<div class="wizardStep"><div class="wizardArt"><img src="icons/cd.png" style="width:56px;height:56px"></div>
      <div class="wizardMain">${html}</div></div><div class="wizardBtns">${btns}</div>`;
    stepEl = body.querySelector('.wizardMain');
  };

  const stepWelcome = () => {
    render(`<h3>Welcome to the Zero Hour Setup Wizard</h3>
      <p>This wizard installs <b>Command &amp; Conquer Generals: Zero Hour</b>
      into your browser's private storage.</p>
      <p>You need your own copy of the game (Steam). Files are read locally —
      nothing is uploaded.</p>`,
      `<button id="next">Next &gt;</button>`);
    body.querySelector('#next').onclick = stepSource;
  };

  const stepSource = () => {
    render(`<h3>Insert your game files</h3>
      <p>Choose where your Zero Hour installation lives:</p>
      <p style="margin:14px 0 4px"><button id="srcFolder" style="width:100%">📁 From this computer (Steam folder)…</button></p>
      <p style="margin:4px 0"><button id="srcZip" style="width:100%">🗜️ From an asset pack (.zip)…</button></p>
      <p style="margin:4px 0"><button disabled style="width:100%">☁️ From Google Drive / Dropbox (soon)</button></p>
      <p style="font-size:11px;color:#555">Steam path: steamapps/common/Command and Conquer Generals Zero Hour<br>
      iCloud Drive works through either picker.</p>
      <input type="file" id="fbFolder" webkitdirectory multiple style="display:none">
      <input type="file" id="fbZip" accept=".zip" style="display:none">`,
      `<button id="back">&lt; Back</button>`);
    body.querySelector('#back').onclick = stepWelcome;

    const fbFolder = body.querySelector('#fbFolder');
    const fbZip = body.querySelector('#fbZip');

    body.querySelector('#srcFolder').onclick = async () => {
      if (window.showDirectoryPicker) {
        try {
          const dir = await window.showDirectoryPicker({ mode: 'read' });
          const files = [];
          let total = 0;
          async function walk(d, prefix) {
            for await (const [name, h] of d.entries()) {
              const rel = prefix ? `${prefix}/${name}` : name;
              if (h.kind === 'file') {
                if (classify(rel)) { const f = await h.getFile(); files.push({ rel, size: f.size, blob: async () => f }); total += f.size; }
              } else if (prefix.split('/').length < 3) await walk(h, rel);
            }
          }
          await walk(dir, '');
          stepCopy(files, total);
        } catch (e) { if (e.name !== 'AbortError') throw e; }
      } else fbFolder.click();
    };
    fbFolder.onchange = () => {
      const files = [...fbFolder.files]
        .map(f => ({ rel: f.webkitRelativePath || f.name, size: f.size, blob: async () => f }))
        .filter(e => classify(e.rel));
      stepCopy(files, files.reduce((s, e) => s + e.size, 0));
    };
    body.querySelector('#srcZip').onclick = () => fbZip.click();
    fbZip.onchange = async () => {
      const file = fbZip.files[0];
      if (!file) return;
      const files = [];
      let total = 0;
      for await (const e of zipEntries(file))
        if (classify(e.name)) { files.push({ rel: e.name, size: e.rawSize, blob: e.blob }); total += e.rawSize; }
      stepCopy(files, total);
    };
  };

  const stepCopy = async (files, total) => {
    // Depot duplicates (Data/INI/INIZH.big, base SkirmishScripts.scb) must
    // not clobber the real ZH files — keep the shallowest copy per target.
    files = dedupeImports(files, (f) => f.rel);
    total = files.reduce((s, f) => s + f.size, 0);
    if (!files.length) {
      render(`<h3>No game files found</h3><p>That location has none of the expected
        archives. Pick the Zero Hour install folder itself.</p>`,
        `<button id="back">&lt; Back</button>`);
      body.querySelector('#back').onclick = stepSource;
      return;
    }
    const storageError = (why) => {
      render(`<h3>Setup cannot continue</h3>
        <p style="display:flex;gap:10px;align-items:flex-start">
        <svg width="26" height="26" viewBox="0 0 32 32" style="flex:0 0 26px" aria-hidden="true">
          <circle cx="16" cy="16" r="15" fill="#d83a2e"/>
          <path d="M10 10 L22 22 M22 10 L10 22" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
        </svg><span>${why}</span></p>`,
        `<button id="back">&lt; Back</button>`);
      body.querySelector('#back').onclick = stepSource;
    };
    render(`<h3>Installing…</h3>
      <p>Copying game files into browser storage. Please wait.</p>
      <progress id="p" max="100" value="0"></progress>
      <div class="filelist" id="list"></div>`, ``);
    const list = stepEl.querySelector('#list');
    const p = stepEl.querySelector('#p');
    await requestPersistence();
    if (!await opfsWritable()) {
      storageError(`This browser window can't keep the game files: persistent
        storage is blocked. Private Browsing windows do this — open Igroteka
        in a regular window and run Setup again.`);
      return;
    }
    const inv = await opfsInventory();
    let done = 0;
    try {
    for (const f of files) {
      const c = classify(f.rel);
      const row = document.createElement('div');
      row.innerHTML = `<span>${c.dir}/${c.name}</span><span>…</span>`;
      list.appendChild(row); list.scrollTop = list.scrollHeight;
      // Repair runs: skip files already imported (same name + size)
      let skipped = false;
      if ((inv[c.dir] || []).includes(c.name)) {
        try {
          const existing = await opfsReadFile(c.dir, c.name);
          if (existing.size === f.size) skipped = true;
        } catch { /* import fresh */ }
      }
      if (!skipped) {
        const blob = await f.blob();
        await opfsWrite(c.dir, c.name, blob, (w) => { p.value = ((done + w) / total) * 100; });
      }
      done += f.size;
      p.value = (done / total) * 100;
      row.lastChild.textContent = skipped ? '✓ (kept)' : '✓';
      row.lastChild.className = 'ok';
    }
    } catch (e) {
      storageError(e && e.name === 'QuotaExceededError'
        ? `The browser ran out of storage space for the game files.
           Free up disk space, or check this site's storage allowance,
           then run Setup again.`
        : `Copying failed: ${e && e.message ? e.message : e}. Reload the
           page and run Setup again.`);
      return;
    }
    stepFinish();
  };

  const stepFinish = async () => {
    const missing = missingFiles(await opfsInventory());
    if (missing.length) {
      render(`<h3>Almost there</h3><p>Still missing:</p>
        <div class="filelist">${missing.map(m => `<div><span>${m}</span><span class="bad">missing</span></div>`).join('')}</div>
        <p>Add them from another folder or pack.</p>`,
        `<button id="back">&lt; Back</button>`);
      body.querySelector('#back').onclick = stepSource;
      return;
    }
    localStorage.setItem('zh-installed', '1');
    placeGameIcon();
    render(`<h3>Setup complete ✓</h3>
      <p><b>C&amp;C Generals: Zero Hour</b> is installed. A shortcut has been
      placed on your desktop.</p>`,
      `<button id="play">Finish &amp; Play</button>`);
    body.querySelector('#play').onclick = () => location.href = 'play/zh/';
  };

  stepWelcome();
}

async function openUninstall() {
  const body = makeWindow('uninstall', 'Uninstall — C&C Generals: Zero Hour', 520);
  if (!body) return;
  const render = (html, btns) => {
    body.innerHTML = `<div class="wizardStep"><div class="wizardArt"><img src="icons/trash.png" style="width:56px;height:56px"></div>
      <div class="wizardMain">${html}</div></div><div class="wizardBtns">${btns}</div>`;
  };
  render(`<h3>Uninstall Zero Hour</h3>
    <p>This removes the game files from your browser's private storage on this
    device. Your original Steam installation is not touched.</p>
    <p>You can reinstall any time from the desktop Setup icon.</p>`,
    `<button id="cancel">Cancel</button><button id="go">Uninstall</button>`);
  body.querySelector('#cancel').onclick = () =>
    body.closest('.window').querySelector('[aria-label="Close"]').click();
  body.querySelector('#go').onclick = async () => {
    render(`<h3>Removing…</h3><progress id="p" max="100" value="10"></progress>`, ``);
    const p = body.querySelector('#p');
    const root = await navigator.storage.getDirectory();
    const dirs = ['zh', 'base', 'scripts', 'icons'];
    for (let i = 0; i < dirs.length; i++) {
      try { await root.removeEntry(dirs[i], { recursive: true }); } catch { /* absent */ }
      p.value = 10 + ((i + 1) / dirs.length) * 90;
    }
    localStorage.removeItem('zh-installed');
    const icon = document.getElementById('zhIcon');
    if (icon) icon.remove();
    document.getElementById('smPlay').style.display = 'none';
    document.getElementById('smUninstall').style.display = 'none';
    document.getElementById('setupIcon').style.display = '';
    document.getElementById('smSetup').style.display = '';
    render(`<h3>Uninstalled ✓</h3>
      <p><b>C&amp;C Generals: Zero Hour</b> has been removed from this browser.</p>`,
      `<button id="closeU">Finish</button>`);
    body.querySelector('#closeU').onclick = () =>
      body.closest('.window').querySelector('[aria-label="Close"]').click();
  };
}

// ---------- accounts ----------
// Identity lives in the cafe worker (/api). The start-menu header mirrors it;
// the User Accounts window manages sign-in, linking and cloud saves.
let ME = { user: null, accounts: [], clouds: [] };

async function refreshIdentity() {
  try { ME = await cafe.fetchMe(); } catch { ME = { user: null, accounts: [], clouds: [] }; }
  const header = document.querySelector('#smHeader');
  header.querySelector('.uname').textContent = ME.user ? ME.user.display_name : 'Гость';
  const img = header.querySelector('.avatar img');
  img.src = (ME.user && ME.user.avatar_url) || 'icons/user.png';
  return ME;
}

const ACCT_ERRORS = {
  linked_to_other_account: 'That sign-in is already linked to a different Igroteka account. Log off first to use it.',
  no_refresh_token: 'The cloud provider did not grant offline access. Try connecting again.',
  access_denied: 'Sign-in was cancelled.',
  auth_required: 'Sign in first, then connect cloud storage.',
  state_mismatch: 'Sign-in did not complete (stale request). Try again.',
  exchange_failed: 'Sign-in did not complete. Try again.',
};

async function openAccount(errReason) {
  const body = makeWindow('account', 'User Accounts', 430);
  if (!body) return;
  const render = async () => {
    let config = { providers: {}, clouds: {} };
    try { config = await cafe.fetchConfig(); } catch { /* API down: buttons disable */ }
    await refreshIdentity();
    const err = errReason
      ? `<div class="acctErr"><span>⚠️</span><span>${ACCT_ERRORS[errReason] || 'Something went wrong. Try again.'}</span></div>`
      : '';
    errReason = null;

    if (!ME.user) {
      const prov = (p, label) => `<button class="acctBtn" data-auth="${p}" ${config.providers[p] ? '' : 'disabled title="Not configured yet"'}>${label}</button>`;
      body.innerHTML = `<div style="padding:14px;font-size:12px">
        ${err}
        <h3 style="margin-top:0">Sign in to Igroteka</h3>
        <p>Keep your name and cloud saves across devices.</p>
        ${prov('google', '🔵 Sign in with Google')}
        ${prov('github', '⚫ Sign in with GitHub')}
        ${prov('discord', '🟣 Sign in with Discord')}
        <div style="text-align:center;color:#777;margin:6px 0">— or —</div>
        <button class="acctBtn" id="acctGuest">👤 Continue as Guest</button>
        <p style="font-size:11px;color:#555">A guest profile lives in this browser only,
        until you link a sign-in to keep it.</p>
      </div>`;
      body.querySelectorAll('[data-auth]').forEach((b) => {
        b.onclick = () => { location.href = cafe.authStartURL(b.dataset.auth); };
      });
      body.querySelector('#acctGuest').onclick = async () => {
        await cafe.guestLogin();
        render();
      };
      return;
    }

    const u = ME.user;
    const linked = new Set(ME.accounts);
    const clouds = new Map(ME.clouds.map((c) => [c.provider, c]));
    const provRow = (p, label) => {
      if (linked.has(p)) return `<div class="acctRow"><span class="grow">${label}</span><span class="acctBadge">linked</span></div>`;
      const dis = config.providers[p] ? '' : 'disabled title="Not configured yet"';
      return `<div class="acctRow"><span class="grow">${label}</span><button data-auth="${p}" ${dis}>Link…</button></div>`;
    };
    const cloudRow = (p, label) => {
      const c = clouds.get(p);
      if (c) return `<div class="acctRow"><span class="grow">${label} — <b>${escapeHtml(c.label || 'connected')}</b></span><button data-cloud-off="${p}">Disconnect</button></div>`;
      const dis = config.clouds[p] ? '' : 'disabled title="Not configured yet"';
      return `<div class="acctRow"><span class="grow">${label}</span><button data-cloud-on="${p}" ${dis}>Connect…</button></div>`;
    };
    body.innerHTML = `<div style="padding:14px;font-size:12px">
      ${err}
      <div style="display:flex;gap:12px;align-items:center;margin-bottom:10px">
        <img src="${escapeHtml(u.avatar_url || 'icons/user.png')}" style="width:48px;height:48px;border-radius:6px;object-fit:cover;border:1px solid #999">
        <div style="flex:1">
          <div id="acctNameRow" style="font-size:14px;font-weight:bold">${escapeHtml(u.display_name)}
            ${u.is_guest ? '<span class="acctBadge">guest</span>' : ''}</div>
          <div style="margin-top:4px">
            <button id="acctRename">Rename…</button>
            <span id="acctRenameBox" style="display:none">
              <input id="acctNameInput" maxlength="24" style="width:130px">
              <button id="acctNameSave">OK</button>
            </span>
          </div>
        </div>
      </div>
      ${u.is_guest ? `<p style="font-size:11px;color:#555;margin:0 0 8px">This guest profile lives in this
        browser only. Link a sign-in below to keep it everywhere.</p>` : ''}
      <fieldset><legend>Sign-ins</legend>
        ${provRow('google', '🔵 Google')}
        ${provRow('github', '⚫ GitHub')}
        ${provRow('discord', '🟣 Discord')}
      </fieldset>
      <fieldset style="margin-top:8px"><legend>Cloud saves</legend>
        ${cloudRow('gdrive', '📁 Google Drive')}
        ${cloudRow('dropbox', '📦 Dropbox')}
        <p style="font-size:11px;color:#555;margin:6px 0 0">Saves and replays go to your own
        cloud storage. Igroteka servers never see them.</p>
      </fieldset>
      <div style="text-align:right;margin-top:10px"><button id="acctLogout">Log Off</button></div>
    </div>`;
    body.querySelectorAll('[data-auth]').forEach((b) => {
      b.onclick = () => { location.href = cafe.authStartURL(b.dataset.auth); };
    });
    body.querySelectorAll('[data-cloud-on]').forEach((b) => {
      b.onclick = () => { location.href = cafe.connectStartURL(b.dataset.cloudOn); };
    });
    body.querySelectorAll('[data-cloud-off]').forEach((b) => {
      b.onclick = async () => { b.disabled = true; await cafe.disconnectCloud(b.dataset.cloudOff); render(); };
    });
    body.querySelector('#acctRename').onclick = () => {
      body.querySelector('#acctRename').style.display = 'none';
      const box = body.querySelector('#acctRenameBox');
      const input = body.querySelector('#acctNameInput');
      box.style.display = '';
      input.value = u.display_name;
      input.focus();
      const save = async () => {
        const name = input.value.trim();
        if (name && name !== u.display_name) await cafe.rename(name);
        render();
      };
      body.querySelector('#acctNameSave').onclick = save;
      input.onkeydown = (e) => { if (e.key === 'Enter') save(); };
    };
    body.querySelector('#acctLogout').onclick = async () => {
      await cafe.logout();
      render();
    };
  };
  render();
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

{

// ---------- boot screen + startup chime ----------
function playChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = ctx.createGain();
    master.gain.value = 0.22;
    master.connect(ctx.destination);
    // Original composition — a soft rising four-note pad (not the MS chime)
    const notes = [[523.25, 0.00], [659.25, 0.12], [783.99, 0.24], [1046.5, 0.40]];
    for (const [freq, t] of notes) {
      const o = ctx.createOscillator(); o.type = 'triangle'; o.frequency.value = freq;
      const o2 = ctx.createOscillator(); o2.type = 'sine'; o2.frequency.value = freq / 2;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, ctx.currentTime + t);
      g.gain.linearRampToValueAtTime(0.8, ctx.currentTime + t + 0.06);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 1.9);
      o.connect(g); o2.connect(g); g.connect(master);
      o.start(ctx.currentTime + t); o2.start(ctx.currentTime + t);
      o.stop(ctx.currentTime + t + 2); o2.stop(ctx.currentTime + t + 2);
    }
    return true;
  } catch { return false; }
}

// The boot screen is visible from the first paint (markup default) — the
// inline script in <body> already hid it for same-session revisits.
const boot = document.getElementById('boot');
if (!sessionStorage.getItem('booted')) {
  sessionStorage.setItem('booted', '1');
  setTimeout(() => {
    boot.classList.add('hidden');
    // Autoplay policy: chime needs a prior user gesture; if none yet, arm
    // a one-shot so the first click on the desktop plays it.
    if (!playChimeArmed()) {
      const arm = () => { playChime(); removeEventListener('pointerdown', arm); };
      addEventListener('pointerdown', arm);
    }
  }, 1400);
}
function playChimeArmed() {
  // navigator.userActivation is the honest check for a prior gesture
  if (navigator.userActivation && navigator.userActivation.hasBeenActive) return playChime();
  return false;
}
