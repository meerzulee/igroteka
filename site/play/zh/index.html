<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Zero Hour — Igroteka</title>
  <link rel="stylesheet" href="../../xp.css">
  <style>
    html, body { margin:0; background:#000; color:#cfd2dd; overflow:hidden;
                 font: 13px/1.5 "Segoe UI", Roboto, sans-serif; }
    #stage { display:flex; justify-content:center; align-items:center;
             min-height:100vh; padding:14px; box-sizing:border-box; }
    /* Scale down to fit the window (4:3 kept via the canvas intrinsic ratio)
       instead of clipping — a flush-cropped top row reads as a bug. */
    canvas { width:auto; height:auto;
             max-width:min(1024px, 100%);
             max-height:min(768px, calc(100vh - 28px));
             background:#000; }
    /* Zero Hour-style loading screen — original tactical art, no game assets */
    #loader { position:fixed; inset:0; z-index:5; overflow:hidden; opacity:1;
              transition: opacity .6s; color:#c9d4e0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 32%, rgba(40,70,120,.35), transparent 70%),
        repeating-linear-gradient(0deg, transparent 0 38px, rgba(70,110,170,.05) 38px 39px),
        repeating-linear-gradient(90deg, transparent 0 38px, rgba(70,110,170,.05) 38px 39px),
        linear-gradient(#05070d, #0a1220 60%, #060a12); }
    #loader.hidden { opacity:0; pointer-events:none; }
    #loader .frame { position:absolute; inset:26px; border:1px solid rgba(90,140,210,.35);
      box-shadow: inset 0 0 60px rgba(20,50,100,.4); }
    #loader .corner { position:absolute; width:22px; height:22px;
      border:2px solid rgba(120,180,255,.8); }
    #loader .corner.tl { top:-1px; left:-1px; border-right:0; border-bottom:0; }
    #loader .corner.tr { top:-1px; right:-1px; border-left:0; border-bottom:0; }
    #loader .corner.bl { bottom:-1px; left:-1px; border-right:0; border-top:0; }
    #loader .corner.br { bottom:-1px; right:-1px; border-left:0; border-top:0; }
    #loader .center { position:absolute; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:20px; text-align:center; }
    #wm { font-weight:800; letter-spacing:2px; line-height:1; }
    #wm .a { font-size:20px; color:#8fa9c8; letter-spacing:6px; }
    #wm .b { font-size:46px; margin-top:6px;
      background:linear-gradient(#eaf2ff, #7fa8d8 60%, #3f6ba8);
      -webkit-background-clip:text; background-clip:text; color:transparent;
      text-shadow:0 2px 10px rgba(60,110,180,.5); }
    #wm .c { font-size:16px; color:#c98b3b; letter-spacing:10px; margin-top:4px; }
    #bwrap { width:460px; max-width:70vw; }
    /* Native ZH bar: 148x16 at 800x600 -> keep the game's proportions.
       Drawn from the user's own UI atlas; hidden until the art is ready. */
    /* Sized in JS like the engine sizes the widget: the 148x16 (at 800x600)
       rect scales with the viewport, while segment width and insets stay in
       absolute pixels — that's what gives the native thin-frame look. */
    #natbar { display:none; width:auto; height:auto; max-width:none;
              background:none; margin:0 auto; }
    body.native #bwrap { position:fixed; bottom:4%; left:50%;
              transform:translateX(-50%); z-index:6; }
    body.native #track { display:none; }
    body.native #natbar { display:block; }
    body.native #tip { bottom:120px; }
    #track { height:16px; border:1px solid rgba(120,170,240,.55); padding:2px;
      background:rgba(10,20,40,.6); border-radius:2px; overflow:hidden; }
    #fill { height:100%; width:0; border-radius:1px;
      background:repeating-linear-gradient(90deg,#3f7bd6 0 10px, transparent 10px 14px),
                 linear-gradient(#5b9ae6,#2b63cf);
      box-shadow:0 0 10px rgba(70,130,230,.6); transition:width .3s; }
    #msg { margin-top:10px; font-size:12px; color:#8fa9c8; min-height:16px;
      letter-spacing:1px; text-transform:uppercase; }
    /* Until the game files are confirmed present, the loader is a bare black
       screen — the branded art only appears for an actual boot. */
    #loader.bare { background:#000; }
    #loader.bare .center, #loader.bare .frame, #loader.bare #tip { display:none; }
    /* XP crash dialog — shown over the canvas like a real game crash */
    #crash { display:none; position:fixed; inset:0; z-index:10;
             align-items:center; justify-content:center; }
    #crash .window { width:420px; box-shadow:4px 4px 16px rgba(0,0,0,.55); }
    #crash .body { display:flex; gap:14px; padding:16px 14px;
             align-items:flex-start; background:#fff; font-size:12px;
             line-height:1.5; color:#000; letter-spacing:.5px; }
    #crash .btns { display:flex; justify-content:center; gap:8px; padding:10px; }
    #tip { position:absolute; bottom:52px; left:0; right:0; text-align:center;
      color:#7d93b2; font-size:13px; font-style:italic; padding:0 40px; }
    #tip b { color:#c98b3b; font-style:normal; letter-spacing:1px; }
    a { color:#e8b34b; }
  </style>
</head>
<body>
  <div id="loader" class="bare">
    <div class="frame">
      <span class="corner tl"></span><span class="corner tr"></span>
      <span class="corner bl"></span><span class="corner br"></span>
    </div>
    <div class="center">
      <div id="wm">
        <div class="a">COMMAND &amp; CONQUER</div>
        <div class="b">GENERALS</div>
        <div class="c">ZERO HOUR</div>
      </div>
      <div id="bwrap">
        <canvas id="natbar" width="148" height="16"></canvas>
        <div id="track"><div id="fill"></div></div>
        <div id="msg">Checking your game files…</div>
      </div>
    </div>
    <div id="tip"></div>
  </div>
  <div id="stage">
    <canvas id="canvas" width="1024" height="768" oncontextmenu="event.preventDefault()"></canvas>
  </div>
  <div id="crash">
    <div class="window">
      <div class="title-bar">
        <div class="title-bar-text">C&amp;C Generals: Zero Hour</div>
        <div class="title-bar-controls"><button aria-label="Close" id="crashX"></button></div>
      </div>
      <div class="body">
        <svg width="32" height="32" viewBox="0 0 32 32" style="flex:0 0 32px" aria-hidden="true">
          <circle cx="16" cy="16" r="15" fill="#d83a2e"/>
          <path d="M10 10 L22 22 M22 10 L10 22" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
        </svg>
        <div id="crashMsg"></div>
      </div>
      <div class="btns" id="crashBtns"></div>
    </div>
  </div>

<script type="module">
import { ZH_MANIFEST, opfsInventory, missingFiles, opfsReadFile, loadingImageURL,
         nativeBarAtlas, drawNativeBar } from '../../igroteka.js?v=8';

const msg = document.getElementById('msg');
const fill = document.getElementById('fill');
const loader = document.getElementById('loader');

// Backstop: never leave the player staring at a silent black page.
addEventListener('unhandledrejection', (e) => {
  const known = String(e.reason || '');
  if (known.includes('assets missing') || known.includes('storage blocked')) return;
  showCrashDialog(
    `Zero Hour has encountered a problem and needs to close.
     We are sorry for the inconvenience.<br><br>
     <span style="color:#555">${known.slice(0, 300)}</span>`, { reload: true });
});
const tipEl = document.getElementById('tip');
const DEV = new URLSearchParams(location.search).get('dev') === '1';
let natCtx = null, natAtlas = null, lastPct = 0;
const bar = { set value(v) {
  lastPct = v;
  fill.style.width = Math.max(0, Math.min(100, v)) + '%';
  if (natCtx) {
    const c = natCtx.canvas;
    drawNativeBar(natCtx, natAtlas, v, c.width, c.height);
  }
} };

// XP crash dialog over the canvas — like a real game crash on the desktop.
function showCrashDialog(html, opts = {}) {
  document.getElementById('crashMsg').innerHTML = html;
  const btns = document.getElementById('crashBtns');
  btns.innerHTML = '';
  const add = (label, fn) => {
    const b = document.createElement('button');
    b.textContent = label; b.onclick = fn; btns.appendChild(b);
  };
  if (opts.setup) add('Run Setup', () => location.href = '../../?run=setup');
  if (opts.reload) add('Reload', () => location.reload());
  add('Close', () => location.href = '../../');
  document.getElementById('crashX').onclick = () => location.href = '../../';
  document.getElementById('crash').style.display = 'flex';
}

// The game's own gold loading bar, sliced live from the user's EnglishZH.big.
// The 148x16 (800x600) widget rect scales with the window like the engine
// scales it; insets and 3px segments stay absolute (W3DProgressBar.cpp).
function sizeNativeBar() {
  const c = document.getElementById('natbar');
  c.width = Math.max(148, Math.round(148 * innerWidth / 800));
  c.height = Math.max(16, Math.round(16 * innerHeight / 600));
  if (natCtx && natAtlas) {
    natCtx.imageSmoothingEnabled = false;
    drawNativeBar(natCtx, natAtlas, lastPct, c.width, c.height);
  }
}
async function initNativeBar() {
  const src = DEV ? await fetch('/gamedata/EnglishZH.big').then(r => r.ok ? r.blob() : null).catch(() => null) : null;
  natAtlas = await nativeBarAtlas(src);
  if (!natAtlas) return;
  natCtx = document.getElementById('natbar').getContext('2d');
  document.body.classList.add('native');
  sizeNativeBar();
  addEventListener('resize', sizeNativeBar);
}

// Use the game's own loading splash as the backdrop if the install had it.
async function initSplash() {
  let url = DEV ? '/gamedata/Install_Final.bmp' : await loadingImageURL();
  if (!url) return;
  const img = new Image();
  img.onload = () => {
    loader.style.backgroundImage = `linear-gradient(rgba(4,7,13,.35), rgba(4,7,13,.72)), url(${url})`;
    loader.style.backgroundSize = 'cover';
    loader.style.backgroundPosition = 'center';
    // the game's own art carries the branding — drop our CSS wordmark
    const wm = document.getElementById('wm'); if (wm) wm.style.display = 'none';
  };
  img.src = url;
}

const TIPS = [
  'Capture oil derricks for a steady stream of extra cash.',
  'Garrison civilian buildings to give your infantry cover and range.',
  'Use the Radar Van scan to reveal stealthed enemy units.',
  'A well-timed superweapon can turn the tide — but watch the timer.',
  'Repair damaged vehicles at a War Factory to save on rebuild costs.',
  'Combine units of different types — pure armies have hard counters.',
  'Your game files never leave this device. Igroteka hosts nothing.',
];
let tipTimer = null;
function startTips() {
  let i = Math.floor(Date.now() / 1000) % TIPS.length;
  const show = () => { tipEl.innerHTML = '<b>TIP</b> &nbsp; ' + TIPS[i % TIPS.length]; i++; };
  show(); tipTimer = setInterval(show, 5000);
}
let revealed = false;
function hideLoader() {
  if (revealed) return;
  revealed = true;
  if (tipTimer) clearInterval(tipTimer);
  loader.classList.add('hidden');
  setTimeout(() => { loader.style.display = 'none'; }, 700);
}

// dir -> wasm FS destination
const DEST = {
  zh: (n) => `/game/${n}`,
  base: (n) => `/game-base/${n}`,
  scripts: (n) => `/game/Data/Scripts/${n}`,
};

async function sources() {
  if (DEV) {
    // Dev mode: fetch from /gamedata like the old boot harness (local server only)
    const map = { zh: (n) => `/gamedata/${n}`, base: (n) => `/gamedata/base-${n}`,
                  scripts: (n) => `/gamedata/Scripts/${n}` };
    const out = [];
    for (const [dir, files] of Object.entries(ZH_MANIFEST))
      for (const f of files)
        out.push({ dir, name: f, load: async () => {
          const r = await fetch(map[dir](f));
          if (!r.ok) throw new Error(`${f}: HTTP ${r.status}`);
          return new Uint8Array(await r.arrayBuffer());
        }});
    return out;
  }
  let inv;
  try {
    inv = await opfsInventory();
  } catch {
    // Safari Private Browsing rejects navigator.storage.getDirectory() itself
    showCrashDialog(
      `Zero Hour cannot run in this browser window: access to browser storage
       is blocked.<br><br>Private Browsing windows do this — open Igroteka in
       a regular window instead.`);
    throw new Error('storage blocked');
  }
  const missing = missingFiles(inv);
  if (missing.length) {
    localStorage.removeItem('zh-installed');  // install claim is stale
    showCrashDialog(
      `Zero Hour could not start because the game files were not found on
       this computer.<br><br>Run <b>Setup — C&amp;C Generals: Zero Hour</b>
       to bring your game files back, then try again.`, { setup: true });
    throw new Error('assets missing');
  }
  const out = [];
  for (const [dir, files] of Object.entries(ZH_MANIFEST))
    for (const f of files)
      out.push({ dir, name: f, load: async () => {
        const file = await opfsReadFile(dir, f);
        return new Uint8Array(await file.arrayBuffer());
      }});
  return out;
}

let files;
try { files = await sources(); } catch (e) { throw e; }

// Files confirmed — only now show the branded loading screen.
loader.classList.remove('bare');
startTips();
initSplash();
initNativeBar();

// Reveal the canvas the moment the engine actually draws: d8web logs a
// "[d8web] draw #N" line every 500 draw calls, and the first one lands while
// the engine paints its own load screen. Pixel-polling can't do this —
// Safari always reads back black from a non-preserved WebGL buffer, which
// made every load look stuck for the full 20s fallback.
const logAndReveal = (t) => {
  if (typeof t === 'string') {
    if (!revealed && t.startsWith('[d8web] draw')) hideLoader();
    // Engine died before it could draw — say so instead of a silent black
    // canvas. Brave's fingerprint shield is the common WebGL2 blocker.
    if (t.includes('WebGL2 context creation failed')) {
      showCrashDialog(
        `Zero Hour could not start because the browser blocked WebGL2
         (graphics).<br><br>In Brave: click the Shields icon in the address
         bar and turn off fingerprint protection for this site, then reload.`,
        { reload: true });
    } else if (t.startsWith('FATAL ERROR')) {
      showCrashDialog(
        `Zero Hour has encountered a problem and needs to close.
         We are sorry for the inconvenience.<br><br>
         <span style="color:#555">${t}</span>`, { reload: true });
    }
  }
  console.log(t);
};

// Create the WebGL2 context BEFORE the engine, with the engine's own
// attributes (d8web gl_backend.cpp). Whoever calls getContext first wins the
// attributes for good. It must be alpha:false — with the default alpha:true
// the terrain shore pass writes low framebuffer alpha as a scratch channel
// and the browser composites those pixels against the black page: black
// sawtooth along shorelines and around rocks. And it must exist page-side —
// in Safari an engine-created context renders but never composites.
document.getElementById('canvas').getContext('webgl2', {
  alpha: false, depth: true, stencil: true, antialias: false,
  preserveDrawingBuffer: true,
});

window.Module = {
  canvas: document.getElementById('canvas'),
  // Stable version tag so the 9MB wasm caches between runs — Date.now() here
  // forced a full re-download and recompile on every single load.
  locateFile: (p) => p + '?v=10',
  arguments: ['-win'],
  print: logAndReveal,
  printErr: logAndReveal,
  onAbort: (w) => {
    showCrashDialog(
      `Zero Hour has encountered a problem and needs to close.
       We are sorry for the inconvenience.<br><br>
       <span style="color:#555">${w}</span>`, { reload: true });
  },
  onRuntimeInitialized: () => {
    msg.textContent = 'Loading the shell…';
    // The reveal happens on the first '[d8web] draw' log (logAndReveal).
    setTimeout(hideLoader, 30000);  // last-resort fallback
  },
  // EXIT GAME in the menu ends the engine — return to the desktop like
  // closing a fullscreen game dropped you back to Windows.
  onExit: () => { location.href = '../../'; },
  quit: () => { location.href = '../../'; },
  onGameExit: () => { location.href = '../../'; },
  preRun: [function () {
    ENV.CNC_GENERALS_ZH_PATH = '/game';
    ENV.CNC_GENERALS_PATH = '/game-base';
    ENV.HOME = '/home/web_user';
    FS.mkdir('/game'); FS.mkdir('/game-base'); FS.mkdirTree('/game/Data/Scripts');
    FS.mkdirTree('/fonts');
    const userDir = '/home/web_user/.local/share/GeneralsX/GeneralsZH';
    FS.mkdirTree(userDir);
    // Staged fresh each boot (MEMFS): Medium detail as the predictable
    // default — without StaticGameLOD the engine CPU-benchmarks itself every
    // load (wasm timing lies, result varies). The corner fps/clock HUD is
    // fine at default size now that the engine anchors it inside the frame.
    FS.writeFile(userDir + '/Options.ini',
      'UseShadowVolumes = no\n' +
      'UseShadowDecals = no\n' +
      'Resolution = 1024 768\n' +
      'StaticGameLOD = Medium\n' +
      'IdealStaticGameLOD = Medium\n');

    addRunDependency('gamedata');
    (async () => {
      // Font is ours to host (Liberation Sans, SIL OFL)
      const font = await fetch('./default.ttf').then(r => r.arrayBuffer());
      FS.writeFile('/fonts/default.ttf', new Uint8Array(font));

      let done = 0;
      for (const f of files) {
        msg.textContent = `Loading ${f.name}…`;
        const data = await f.load();
        FS.writeFile(DEST[f.dir](f.name), data);
        bar.value = (++done / files.length) * 100;
      }
      msg.textContent = 'Starting engine…';
      bar.value = 100;
      removeRunDependency('gamedata');
    })().catch(e => { msg.textContent = 'Load failed: ' + e; });
  }],
};

const s = document.createElement('script');
s.src = './GeneralsXZH.js?v=10';
document.body.appendChild(s);
</script>
</body>
</html>
