<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Rome: Total War — Igroteka</title>
  <link rel="stylesheet" href="../../xp.css">
  <style>
    html, body { margin:0; background:#000; color:#cfd2dd; overflow:hidden;
                 font: 13px/1.5 "Segoe UI", Roboto, sans-serif; }
    #stage { display:flex; justify-content:center; align-items:center;
             min-height:100vh; padding:14px; box-sizing:border-box; }
    canvas { background:#000; image-rendering:auto; cursor:url("data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2724%27 height=%2724%27%3E%3Cpath d=%27M2 1 L2 18 L7 14.5 L10 21.5 L13.2 20.2 L10.4 13.4 L16 13 Z%27 fill=%27%23d9a520%27 stroke=%27%234a3208%27 stroke-width=%271.2%27/%3E%3C/svg%3E") 2 1, auto; } /* game draws its own cursor */
    #fsbtn { position:fixed; right:10px; bottom:10px; z-index:4; width:34px; height:34px;
      background:rgba(40,26,14,.55); border:1px solid rgba(200,150,70,.4); border-radius:4px;
      color:#e8d4b0; font-size:18px; line-height:32px; text-align:center; cursor:pointer;
      opacity:.35; transition:opacity .2s; user-select:none; }
    #fsbtn:hover { opacity:1; }
    /* Rome loading screen — no game assets, our own art */
    #loader { position:fixed; inset:0; z-index:5; overflow:hidden; opacity:1;
              transition: opacity .6s; color:#e6d5b8;
      background:
        radial-gradient(ellipse 80% 55% at 50% 32%, rgba(120,40,20,.4), transparent 70%),
        repeating-linear-gradient(0deg, transparent 0 40px, rgba(150,90,40,.05) 40px 41px),
        linear-gradient(#120806, #1c0f08 55%, #0a0503); }
    #loader.hidden { opacity:0; pointer-events:none; }
    #loader .frame { position:absolute; inset:26px; border:1px solid rgba(180,120,60,.35);
      box-shadow: inset 0 0 60px rgba(120,50,20,.4); }
    #loader .corner { position:absolute; width:22px; height:22px;
      border:2px solid rgba(220,160,80,.8); }
    #loader .corner.tl { top:-1px; left:-1px; border-right:0; border-bottom:0; }
    #loader .corner.tr { top:-1px; right:-1px; border-left:0; border-bottom:0; }
    #loader .corner.bl { bottom:-1px; left:-1px; border-right:0; border-top:0; }
    #loader .corner.br { bottom:-1px; right:-1px; border-left:0; border-top:0; }
    #loader .center { position:absolute; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:20px; text-align:center; }
    #wm { font-weight:800; letter-spacing:2px; line-height:1; }
    #wm .a { font-size:18px; color:#c79a5c; letter-spacing:8px; }
    #wm .b { font-size:52px; margin-top:6px;
      background:linear-gradient(#f6e6c8, #d8a860 55%, #a8702f);
      -webkit-background-clip:text; background-clip:text; color:transparent;
      text-shadow:0 2px 10px rgba(180,90,40,.5); }
    #wm .c { font-size:15px; color:#b0563a; letter-spacing:12px; margin-top:6px; }
    #bwrap { width:460px; max-width:70vw; }
    #track { height:16px; border:1px solid rgba(200,150,80,.55); padding:2px;
      background:rgba(30,15,8,.6); border-radius:2px; overflow:hidden; }
    #fill { height:100%; width:0; border-radius:1px;
      background:repeating-linear-gradient(90deg,#c98b3b 0 10px, transparent 10px 14px),
                 linear-gradient(#e0a850,#b0702f);
      box-shadow:0 0 10px rgba(220,150,70,.6); transition:width .3s; }
    #msg { margin-top:10px; font-size:12px; color:#c79a5c; min-height:16px;
      letter-spacing:1px; text-transform:uppercase; }
    #sub { margin-top:4px; font-size:11px; color:#7a6448; min-height:14px;
      font-variant-numeric:tabular-nums; }
    #tip { position:absolute; bottom:52px; left:0; right:0; text-align:center;
      color:#a58a63; font-size:13px; font-style:italic; padding:0 40px; }
    #tip b { color:#d8a860; font-style:normal; letter-spacing:1px; }
    /* XP crash / setup dialog over the canvas */
    #crash { display:none; position:fixed; inset:0; z-index:10;
             align-items:center; justify-content:center; background:rgba(0,0,0,.35); }
    #crash .window { width:440px; box-shadow:4px 4px 16px rgba(0,0,0,.55); }
    #crash .body { display:flex; gap:14px; padding:16px 14px;
             align-items:flex-start; background:#fff; font-size:12px;
             line-height:1.5; color:#000; }
    #crash .btns { display:flex; justify-content:center; gap:8px; padding:10px; }
    a { color:#e8b34b; }
    /* Debug log panel — shown with ?debug=1 (or localStorage ig-debug=1). Every
       worker message + error lands here so a death is visible, not silent. */
    #devlog { display:none; position:fixed; top:0; right:0; bottom:0; width:min(46vw,560px);
      z-index:20; background:rgba(6,4,2,.92); border-left:1px solid #4a2f18;
      color:#cdbb9a; font:11px/1.45 ui-monospace, Menlo, monospace; padding:6px 8px;
      overflow-y:auto; white-space:pre-wrap; word-break:break-all; }
    #devlog.on { display:block; }
    #devlog .e { color:#ff7a6b; }
    #devlog .g { color:#8fd18f; }
    #devlog .i { color:#79b8e6; }
    #devlog .t { color:#7a6448; }
    /* diagnostic lines (jit/gpu/heap) — highlighted for quick copy-paste */
    #devlog .d { color:#ffd479; background:rgba(255,212,121,.09); }
    #devbtn { position:fixed; right:10px; top:10px; z-index:21; width:30px; height:30px;
      background:rgba(40,26,14,.7); border:1px solid rgba(200,150,70,.4); border-radius:4px;
      color:#e8d4b0; font-size:14px; line-height:28px; text-align:center; cursor:pointer;
      opacity:.35; user-select:none; }
    #devbtn:hover { opacity:1; }
    /* FPS overlay — GPU frames per second, top-left of the stage */
    #fps { display:none; position:fixed; left:10px; top:10px; z-index:4;
      padding:2px 8px; background:rgba(40,26,14,.7); border:1px solid rgba(200,150,70,.4);
      border-radius:4px; color:#e8d4b0; font:12px/1.6 ui-monospace, Menlo, monospace;
      font-variant-numeric:tabular-nums; pointer-events:none; }
  </style>
</head>
<body>
  <div id="loader">
    <div class="frame">
      <span class="corner tl"></span><span class="corner tr"></span>
      <span class="corner bl"></span><span class="corner br"></span>
    </div>
    <div class="center">
      <div id="wm">
        <div class="a">TOTAL WAR</div>
        <div class="b">ROME</div>
        <div class="c">IGROTEKA</div>
      </div>
      <div id="bwrap">
        <div id="track"><div id="fill"></div></div>
        <div id="msg">Checking your game files…</div>
        <div id="sub"></div>
      </div>
    </div>
    <div id="tip"></div>
  </div>
  <div id="stage">
    <canvas id="canvas" width="1024" height="768" oncontextmenu="event.preventDefault()"></canvas>
    <canvas id="canvas-gl" width="1024" height="768" style="display:none" oncontextmenu="event.preventDefault()"></canvas>
  </div>
  <div id="fsbtn" title="Fullscreen">⛶</div>
  <div id="devbtn" title="Toggle debug log">🐞</div>
  <div id="diagbtn" title="Copy diagnostic lines (jit/gpu/heap)" style="position:fixed;right:10px;top:46px;z-index:21;width:30px;height:30px;background:rgba(40,26,14,.7);border:1px solid rgba(200,150,70,.4);border-radius:4px;color:#e8d4b0;font-size:14px;line-height:28px;text-align:center;cursor:pointer;opacity:.35;user-select:none">📋</div>
  <div id="fps"></div>
  <div id="devlog"></div>
  <div id="crash">
    <div class="window">
      <div class="title-bar">
        <div class="title-bar-text">Rome: Total War</div>
        <div class="title-bar-controls"><button aria-label="Close" id="crashX"></button></div>
      </div>
      <div class="body">
        <svg width="32" height="32" viewBox="0 0 32 32" style="flex:0 0 32px" aria-hidden="true">
          <circle cx="16" cy="16" r="15" fill="#d83a2e"/>
          <path d="M10 10 L22 22 M22 10 L10 22" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
        </svg>
        <div id="crashMsg"></div>
      </div>
      <div class="btns" id="crashBtns"></div>
    </div>
  </div>

<script>
const canvas = document.getElementById('canvas');
const glCanvas = document.getElementById('canvas-gl'); // GPU output — transferred to the worker
const ctx = canvas.getContext('2d', { alpha: false });
const loader = document.getElementById('loader');
const msg = document.getElementById('msg');
const sub = document.getElementById('sub');
const fill = document.getElementById('fill');
const tipEl = document.getElementById('tip');
const fpsEl = document.getElementById('fps');
let img = null, revealed = false, gpuShown = false, t0 = performance.now();
let gpuFrames = 0, gpuFramesPrev = 0;

// ---- debug log panel (?debug=1 or localStorage ig-debug=1) ----
const devlog = document.getElementById('devlog');
const devbtn = document.getElementById('devbtn');
let IG_DEBUG = new URLSearchParams(location.search).get('debug') === '1'
  || localStorage.getItem('ig-debug') === '1';
if (IG_DEBUG) devlog.classList.add('on');
window.igLogTail = [];                       // last 400 lines, for bug reports
// Lines worth copy-pasting into a bug report: JIT, GPU/RTT, heap, build stamp.
const DIAG_RE = /SetRenderTarget|FBO|d8web|jit:|machine:|zhweb:|heap exhausted|cpu fault/;
window.igDiagTail = []; // diagnostic lines only — kept separately so early
                        // one-shot logs (first SetRenderTarget/FBO) survive
let buildId = '';
function dbg(text, cls) {
  const ts = ((performance.now() - t0) / 1000).toFixed(1);
  window.igLogTail.push(ts + 's ' + text);
  if (window.igLogTail.length > 400) window.igLogTail.shift();
  if (DIAG_RE.test(text)) {
    window.igDiagTail.push(ts + 's ' + text);
    if (window.igDiagTail.length > 600) window.igDiagTail.splice(0, 100);
  }
  const m = /^zhweb: build (\S+)/.exec(text);
  if (m) { buildId = m[1]; fpsEl.style.display = 'block'; fpsEl.textContent = buildId; }
  if (!cls && DIAG_RE.test(text)) cls = 'd';
  const row = document.createElement('div');
  row.innerHTML = '<span class="t">' + ts + 's </span>';
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = text;
  row.appendChild(span);
  devlog.appendChild(row);
  while (devlog.childElementCount > 800) devlog.removeChild(devlog.firstChild);
  devlog.scrollTop = devlog.scrollHeight;
  if (IG_DEBUG) console.log('[rtw] ' + text);
}
devbtn.onclick = () => {
  IG_DEBUG = !IG_DEBUG;
  devlog.classList.toggle('on', IG_DEBUG);
  localStorage.setItem('ig-debug', IG_DEBUG ? '1' : '0');
};
const diagbtn = document.getElementById('diagbtn');
diagbtn.onclick = () => {
  const lines = window.igDiagTail;
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    diagbtn.textContent = '✓';
    setTimeout(() => { diagbtn.textContent = '📋'; }, 1200);
  });
};
addEventListener('error', (e) => dbg('window error: ' + (e.message || e) +
  (e.filename ? ' @ ' + e.filename + ':' + e.lineno : '') +
  (e.error && e.error.stack ? '\n' + e.error.stack : ''), 'e'));
addEventListener('unhandledrejection', (e) =>
  dbg('unhandled rejection: ' + (e.reason && e.reason.message || e.reason || e), 'e'));
dbg('page loaded; worker starting', 'i');

// ---- fullscreen ----
const fsbtn = document.getElementById('fsbtn');
const fsAvailable = !!(document.fullscreenEnabled || document.webkitFullscreenEnabled);
if (!fsAvailable) fsbtn.style.display = 'none';
else fsbtn.addEventListener('click', () => {
  const inFs = document.fullscreenElement || document.webkitFullscreenElement;
  if (inFs) (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  else { const el = document.documentElement;
    (el.requestFullscreen || el.webkitRequestFullscreen).call(el, { navigationUI: 'hide' }); }
});

// ---- fit canvas to window at the game aspect ----
function fitCanvas() {
  const availW = innerWidth - 28, availH = innerHeight - 28;
  const ratio = (canvas.width || 4) / (canvas.height || 3);
  let w = availW, h = w / ratio;
  if (h > availH) { h = availH; w = h * ratio; }
  canvas.style.width = Math.round(w) + 'px';
  canvas.style.height = Math.round(h) + 'px';
  // The GL canvas mirrors the CSS size; its backing size is set by the wasm.
  glCanvas.style.width = canvas.style.width;
  glCanvas.style.height = canvas.style.height;
}
fitCanvas();
addEventListener('resize', fitCanvas);

// ---- crash / setup dialog ----
function showDialog(html, opts = {}) {
  document.getElementById('crashMsg').innerHTML = html;
  const btns = document.getElementById('crashBtns');
  btns.innerHTML = '';
  const add = (label, fn) => { const b = document.createElement('button');
    b.textContent = label; b.onclick = fn; btns.appendChild(b); };
  if (opts.setup) add('Install game files', () => location.href = 'import.html');
  if (opts.reload) add('Reload', () => location.reload());
  add('Close', () => location.href = '../../');
  document.getElementById('crashX').onclick = () => location.href = '../../';
  document.getElementById('crash').style.display = 'flex';
}

// ---- tips ----
const TIPS = [
  'Hold the line — spearmen counter cavalry, cavalry ride down archers, archers whittle spearmen.',
  'High ground and fatigue decide close battles. Charge downhill, keep your men rested.',
  'Bribe or besiege — not every city needs to be stormed.',
  'Flaming ammunition shakes enemy morale but hits less accurately.',
  'Your game files never leave this device. Igroteka hosts nothing.',
  'The interpreter is slow — the menu takes a couple of minutes to load. Watch the bar.',
];
let tipTimer = null, ti = Math.floor(Date.now()/1000) % TIPS.length;
function startTips() {
  const show = () => { tipEl.innerHTML = '<b>TIP</b> &nbsp; ' + TIPS[ti++ % TIPS.length]; };
  show(); tipTimer = setInterval(show, 6000);
}
startTips();

function hideLoader() {
  if (revealed) return; revealed = true;
  if (tipTimer) clearInterval(tipTimer);
  loader.classList.add('hidden');
  setTimeout(() => { loader.style.display = 'none'; }, 700);
}

// ---- worker ----
// Browser JIT opt-in (?jit=1 on this page): forwarded on the worker's query
// string, which passes it to the wasm via zhweb_set_jit before boot/restore.
const IG_JIT = new URLSearchParams(location.search).get('jit') === '1';
// ?bridge=1: Phase-4 interpreter bridge (compiled blocks run through x87/MMX
// via interp_one instead of ending). Only meaningful with ?jit=1.
const IG_BRIDGE = new URLSearchParams(location.search).get('bridge') === '1';
// ?snap=campaign restores rtw.campaign.snap.gz (straight onto the strat map)
// instead of the menu snapshot; anything else keeps the default.
const IG_SNAP = new URLSearchParams(location.search).get('snap') || '';
const workerQS = new URLSearchParams();
if (IG_DEBUG) workerQS.set('verbose', '1');
if (IG_JIT) workerQS.set('jit', '1');
if (IG_BRIDGE) workerQS.set('bridge', '1');
if (IG_SNAP) workerQS.set('snap', IG_SNAP);
let worker;
try { worker = new Worker('worker.js' + (workerQS.toString() ? '?' + workerQS.toString() : '')); }
catch (e) { showDialog('Rome: Total War could not start a worker.<br><br><span style="color:#555">' + e + '</span>', { reload: true }); }

if (worker) {
  // Hand the GPU canvas to the worker (WebGL2 path). Browsers without
  // transferControlToOffscreen silently keep the software renderer.
  try {
    const off = glCanvas.transferControlToOffscreen();
    worker.postMessage({ type: 'canvas', canvas: off }, [off]);
  } catch (err) { dbg('no OffscreenCanvas transfer (software path): ' + err, 'i'); }
  // Forward pointer input to the worker in backbuffer coords: map through the
  // visible canvas's on-screen rect (fitCanvas gives it a CSS size different
  // from its width/height attributes) back to the attribute size. pointermove
  // is throttled to one message per animation frame; down/up go out
  // immediately. b = e.buttons bit0 left, bit1 right (the canvases' inline
  // oncontextmenu already keeps right-click away from the browser menu). The
  // worker drops these until the game has booted.
  let mousePending = null, mouseRaf = 0;
  // Pointer lock (?lock=1): click the canvas to capture the pointer; raw
  // movementX/Y deltas then feed DirectInput 1:1 (type:'mouserel'), which is
  // what makes the strat-map cursor precise — no host-cursor divergence, no
  // dead zone at the canvas edge. ESC releases (browser-standard); absolute
  // events resume automatically.
  const IG_LOCK = new URLSearchParams(location.search).get('lock') === '1';
  const locked = () => document.pointerLockElement === canvas ||
                       document.pointerLockElement === glCanvas;
  let relDx = 0, relDy = 0, relB = 0, relRaf = 0, lastLockTry = -1e9;
  function relFlush() {
    relRaf = 0;
    const dx = Math.round(relDx), dy = Math.round(relDy);
    relDx -= dx; relDy -= dy;   // keep sub-pixel remainders
    if (dx || dy) worker.postMessage({ type: 'mouserel', dx, dy, b: relB });
  }
  function mouseMsg(e) {
    const el = gpuShown ? glCanvas : canvas;
    const r = el.getBoundingClientRect();
    if (!r.width || !r.height) return null;
    return { type: 'mouse',
      x: Math.max(0, Math.min(el.width - 1, Math.round((e.clientX - r.left) * el.width / r.width))),
      y: Math.max(0, Math.min(el.height - 1, Math.round((e.clientY - r.top) * el.height / r.height))),
      b: e.buttons & 3 };
  }
  for (const el of [canvas, glCanvas]) {
    el.addEventListener('pointermove', (e) => {
      if (locked()) {
        // Deltas SUM between animation frames (absolute events may overwrite;
        // relative ones must not drop motion). Scale CSS px -> backbuffer px.
        const r = el.getBoundingClientRect();
        const s = r.width ? el.width / r.width : 1;
        relDx += e.movementX * s;
        relDy += e.movementY * s;
        relB = e.buttons & 3;
        if (!relRaf) relRaf = requestAnimationFrame(relFlush);
        return;
      }
      mousePending = mouseMsg(e);
      if (mousePending && !mouseRaf) mouseRaf = requestAnimationFrame(() => {
        mouseRaf = 0;
        if (mousePending) { worker.postMessage(mousePending); mousePending = null; }
      });
    });
    el.addEventListener('pointerdown', (e) => {
      if (IG_LOCK && !locked()) {
        // requestPointerLock returns a PROMISE; Chrome rejects re-requests
        // within ~1.3s of an ESC exit — swallow it (absolute path carries on)
        // and don't hammer the API during the cooldown.
        const now = performance.now();
        if (now - lastLockTry > 1500) {
          lastLockTry = now;
          try {
            const p = el.requestPointerLock();
            if (p && p.catch) p.catch(() => {});
          } catch (err) { /* fall back to absolute */ }
        }
      }
      if (locked()) {
        worker.postMessage({ type: 'mouserel', dx: 0, dy: 0, b: e.buttons & 3 });
        return;
      }
      try { el.setPointerCapture(e.pointerId); } catch (err) { /* keep going uncaptured */ }
      const m = mouseMsg(e);
      if (m) worker.postMessage(m);
    });
    el.addEventListener('pointerup', (e) => {
      if (locked()) {
        worker.postMessage({ type: 'mouserel', dx: 0, dy: 0, b: e.buttons & 3 });
        return;
      }
      const m = mouseMsg(e);
      if (m) worker.postMessage(m);
    });
  }
  // Forward keyboard input as Windows virtual-key codes (e.keyCode IS the VK
  // code for letters/digits/F-keys/arrows/Escape/Enter/Space). Repeat keydowns
  // go through (games expect auto-repeat WM_KEYDOWN); ch carries the WM_CHAR
  // code on keydown only. Meta/ctrl chords stay with the browser (Cmd+R etc),
  // and keys the browser would act on (space/arrows scroll, Tab, F-keys,
  // paging) are only swallowed when the page itself — not an input — has
  // focus. The worker drops these until the game has booted.
  const keySwallow = /^( |Tab|Arrow(Up|Down|Left|Right)|Page(Up|Down)|Home|End|F\d{1,2})$/;
  function keyEvent(e, down) {
    if (e.metaKey || e.ctrlKey) return; // browser shortcuts keep working
    if (keySwallow.test(e.key) && (e.target === document.body || e.target.tagName === 'CANVAS'))
      e.preventDefault();
    const ch = down ? (e.key.length === 1 ? e.key.charCodeAt(0)
      : e.key === 'Enter' ? 13 : e.key === 'Backspace' ? 8
      : e.key === 'Tab' ? 9 : e.key === 'Escape' ? 27 : 0) : 0;
    worker.postMessage({ type: 'key', vk: e.keyCode, down: down ? 1 : 0, ch });
  }
  addEventListener('keydown', (e) => keyEvent(e, 1));
  addEventListener('keyup', (e) => keyEvent(e, 0));
  // FPS overlay: once a second, show the delta of the worker's gpuFrames counter.
  setInterval(() => {
    if (gpuFrames <= 0) return; // build id only until the GPU path presents
    fpsEl.style.display = 'block';
    fpsEl.textContent = (buildId ? buildId + ' · ' : '') +
                        (gpuFrames - gpuFramesPrev) + ' fps';
    gpuFramesPrev = gpuFrames;
  }, 1000);
  worker.onerror = (e) => {
    dbg('worker.onerror: ' + (e.message || e) + (e.filename ? ' @ ' + e.filename + ':' + e.lineno : ''), 'e');
    showDialog(
      'Rome: Total War has encountered a problem and needs to close.<br><br><span style="color:#555">' +
      (e.message || e) + '</span>', { reload: true });
  };
  worker.onmessage = (e) => {
   try {
    const m = e.data;
    if (typeof m.gpuFrames === 'number') gpuFrames = m.gpuFrames;
    // Once the wasm presents GPU frames into the OffscreenCanvas, swap the GL
    // canvas in and retire the 2D (software) one — a one-time switch. GPU
    // frames mean the game is on screen, so drop the loader too.
    if (!gpuShown && m.gpuFrames > 0) {
      gpuShown = true;
      glCanvas.style.display = '';
      canvas.style.display = 'none';
      dbg('GPU path active — switched to WebGL2 canvas', 'g');
      hideLoader();
    }
    switch (m.type) {
      case 'ready':
        msg.textContent = 'Booting the engine…';
        dbg('WASM + OPFS ready — booting RomeTW.exe', 'i');
        break;
      case 'needimport':
        dbg('needimport: ' + (m.msg || ''), 'e');
        showDialog(
          'Rome: Total War could not start because your game files were not found ' +
          'on this device.<br><br>Install your <b>Rome: Total War</b> folder (the one ' +
          'with <b>RomeTW.exe</b>) to play. Your files never leave this device.',
          { setup: true });
        break;
      case 'frame': {
        // GPU path active → the 2D canvas is hidden; skip the per-pixel swizzle
        // and putImageData into it (the worker stops sending frames too — this
        // guards the boundary slices).
        if (gpuShown) { sub.textContent = (m.icount / 1e9).toFixed(2) + 'B instructions'; break; }
        if (canvas.width !== m.w || canvas.height !== m.h) {
          canvas.width = m.w; canvas.height = m.h; img = null; fitCanvas();
        }
        if (!img || img.width !== m.w) img = ctx.createImageData(m.w, m.h);
        const src = new Uint32Array(m.buf);
        const dst = new Uint32Array(img.data.buffer);
        for (let i = 0; i < src.length; i++) {
          const p = src[i];                       // ARGB 0xAARRGGBB
          dst[i] = 0xFF000000 | ((p & 0xFF) << 16) | (p & 0xFF00) | ((p >> 16) & 0xFF);
        }
        ctx.putImageData(img, 0, 0);
        if (!revealed) dbg('first frame — rendering (' + m.w + 'x' + m.h + ')', 'g');
        hideLoader();
        sub.textContent = (m.icount / 1e9).toFixed(2) + 'B instructions';
        break;
      }
      case 'progress': {
        const secs = ((performance.now() - t0) / 1000).toFixed(0);
        sub.textContent = (m.icount / 1e9).toFixed(2) + 'B instructions · ' + secs + 's';
        const pct = Math.min(95, (m.icount / 14e9) * 100);
        fill.style.width = pct + '%';
        if (m.note) dbg('progress: ' + m.note, 'i');
        break;
      }
      case 'log':
        dbg(m.line);
        if (/loading|load data|load RomeTW/i.test(m.line)) {
          const f = m.line.replace(/^.*load\s+/i, '').split('(')[0].trim();
          if (f) msg.textContent = 'Loading ' + f.slice(0, 48) + '…';
        }
        break;
      case 'done':
        dbg('process exited, code=' + m.code + ' @ ' + (m.icount / 1e9).toFixed(2) + 'B instructions',
            (revealed && m.code === 0) ? 'g' : 'e');
        // A clean quit (code 0 AFTER the game was on screen) returns to the
        // desktop. Exiting BEFORE any frame = a load-time death: show it, don't
        // silently bounce to the desktop (that hid every failure until now).
        if (revealed && m.code === 0) location.href = '../../';
        else showDialog(
          'Rome: Total War stopped during load (exit code ' + m.code + ' at ' +
          (m.icount / 1e9).toFixed(2) + 'B instructions).<br><br>Open the debug log ' +
          '(🐞, top-right) or reload with <b>?debug=1</b> to see where.', { reload: true });
        break;
      case 'error':
        dbg('ERROR: ' + m.msg, 'e');
        showDialog(
          'Rome: Total War has encountered a problem and needs to close.<br><br>' +
          '<span style="color:#555">' + m.msg + '</span>', { reload: true });
        break;
    }
   } catch (err) {
     dbg('message handler threw on "' + (e.data && e.data.type) + '": ' +
         (err && err.stack || err), 'e');
   }
  };
}
</script>
</body>
</html>
