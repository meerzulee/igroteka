<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fortochka — Win32 in a browser tab</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; background: #0b0d10; color: #d7dde3;
    font: 15px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
    display: flex; flex-direction: column; min-height: 100vh;
  }
  header { padding: 20px 24px 8px; }
  h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: .3px; }
  .sub { color: #7d8894; font-size: 13px; margin-top: 4px; }
  main { padding: 8px 24px 24px; flex: 1; }
  .row { display: flex; gap: 10px; align-items: center; margin: 14px 0; flex-wrap: wrap; }
  button, label.file {
    background: #1a2028; color: #d7dde3; border: 1px solid #2b3542;
    padding: 8px 14px; border-radius: 7px; cursor: pointer; font: inherit;
  }
  button:hover, label.file:hover { border-color: #3d4a5a; background: #212933; }
  button:disabled { opacity: .5; cursor: default; }
  input[type=file] { display: none; }
  #term {
    background: #05070a; border: 1px solid #1c242e; border-radius: 8px;
    padding: 14px 16px; white-space: pre-wrap; word-break: break-word;
    min-height: 220px; margin-top: 12px;
  }
  .ok { color: #57d38c; } .err { color: #ff6b6b; } .dim { color: #6b7684; }
  .name { color: #9db3c9; }
</style>
</head>
<body>
<header>
  <h1>Fortochka</h1>
  <div class="sub">A from-scratch Win32 runtime for WebAssembly. This page runs a
    real 32-bit Windows <span class="name">.exe</span> — its x86 code under our
    <span class="name">zhelezo</span> interpreter, its imports served by
    <span class="name">k32web</span>. No Wine, no emulated PC.</div>
</header>
<main>
  <div class="row">
    <label class="file">Choose a .exe<input type="file" id="file" accept=".exe" /></label>
    <button id="run" disabled>Run</button>
    <button id="demo">Run bundled hello.exe</button>
    <span class="dim" id="picked"></span>
  </div>
  <div id="term"><span class="dim">Runtime loading…</span></div>
</main>

<script>
  const term = document.getElementById('term');
  let bytes = null;

  function line(text, cls) {
    const span = document.createElement('span');
    if (cls) span.className = cls;
    span.textContent = text + '\n';
    term.appendChild(span);
  }
  function clear() { term.textContent = ''; }

  // Emscripten Module: route guest stdout/stderr to the terminal div.
  window.Module = {
    print: (t) => line(t),
    printErr: (t) => line(t, 'dim'),
    onRuntimeInitialized: () => {
      clear();
      line('zhelezo + peload + k32web ready.', 'ok');
      line('Pick a 32-bit .exe, or run the bundled corpus binary.', 'dim');
    },
  };

  // NB: must not be named run() — Emscripten's glue exports a global run().
  function runExe(buf, label) {
    clear();
    line('$ fortochka run ' + label, 'dim');
    const n = buf.length;
    const p = Module._malloc(n);
    Module.HEAPU8.set(buf, p);
    let code;
    try {
      code = Module._zhweb_run(p, n, 64);
    } finally {
      Module._free(p);
    }
    line('');
    line(code >= 0 ? `process exited, code ${code}` : `runtime error (${code})`,
         code >= 0 ? 'ok' : 'err');
  }

  document.getElementById('file').addEventListener('change', async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    bytes = new Uint8Array(await f.arrayBuffer());
    document.getElementById('picked').textContent = `${f.name} (${bytes.length} bytes)`;
    document.getElementById('run').disabled = false;
  });
  document.getElementById('run').addEventListener('click', () => {
    if (bytes) runExe(bytes, document.getElementById('file').files[0].name);
  });
  document.getElementById('demo').addEventListener('click', async () => {
    const r = await fetch('hello.exe');
    runExe(new Uint8Array(await r.arrayBuffer()), 'hello.exe');
  });
</script>
<!-- Emscripten glue loads last, after window.Module is defined. -->
<script src="zhweb.js"></script>
</body>
</html>
